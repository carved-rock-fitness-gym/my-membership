name: MyMembership

env:
  GH_TOKEN: ${{ github.token }}

on:
  workflow_dispatch:
    inputs:
      team:
        description: 'Which team workflow to run'
        required: true
        type: choice
        options:
          - atlas
          - beacon
          - catalyst

jobs:
  delegate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger team workflow
        run: |
          echo "Selected team: ${{ github.event.inputs.team }}"
          if [[ "${{ github.event.inputs.team }}" == "atlas" ]]; then
            gh workflow run class-schedule.yml -R ${{ github.repository }}
          elif [[ "${{ github.event.inputs.team }}" == "beacon" ]]; then
            gh workflow run membership.yml -R ${{ github.repository }}
          else
            gh workflow run training.yml -R ${{ github.repository }}
          fi

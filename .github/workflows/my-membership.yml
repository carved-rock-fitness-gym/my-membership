name: MyMembership

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  actions: write

on:
  workflow_dispatch:
    inputs:
      team:
        description: 'Which feature'
        required: true
        type: choice
        options:
          - class_schedule
          - membership
          - training

jobs:
  delegate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger team workflow
        run: |
          echo "Selected team: ${{ github.event.inputs.team }}"
          if [[ "${{ github.event.inputs.team }}" == "class_schedule" ]]; then
            gh workflow run class_schedule.yml -R ${{ github.repository }}
          elif [[ "${{ github.event.inputs.team }}" == "membership" ]]; then
            gh workflow run membership.yml -R ${{ github.repository }}
          else
            gh workflow run training.yml -R ${{ github.repository }}
          fi

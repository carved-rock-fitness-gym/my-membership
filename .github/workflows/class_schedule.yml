name: Class Schedule CI/CD

on:
  push:
    paths:
      - 'src/features/class-schedule/**'
    branches:
      - main
  pull_request:
    paths:
      - 'src/features/class-schedule/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: NODE_OPTIONS=--experimental-vm-modules npm run lint

      - name: Build application
        run: npm run build

      - name: Run Cypress tests
        uses: cypress-io/github-action@v5
        with:
          start: npm run dev
          wait-on: ${{ vars.APP_URL }}
          config-file: cypress.config.ts

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploying class schedule feature to staging..."
          echo "Environment URL: ${{ vars.APP_URL }}"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Smoke test steps

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "Deploying class schedule feature to production..."
          echo "Environment URL: ${{ vars.APP_URL }}"